<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invited Talks</title>
    <link rel="shortcut icon" href="../../images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f3f5f9; --surface:#fff; --text:#1f2937; --muted:#5b6475; --brand:#2c98f0; --border:#e4e9f2; --shadow:0 10px 28px rgba(20,34,66,.08); --radius:8px; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:"Roboto",sans-serif; color:var(--text); background:linear-gradient(180deg,#f8faff 0%,var(--bg) 100%); }
        .container { width:min(1100px,92vw); margin:0 auto; }
        .header-shell,.footer-shell { background:var(--surface); border-bottom:1px solid var(--border); }
        .footer-shell { border-top:1px solid var(--border); border-bottom:0; margin-top:36px; }
        .header { padding:24px 0 18px; text-align:center; }
        .home-link { display:inline-block; margin-top:12px; color:var(--brand); text-decoration:none; font-weight:700; }
        .home-link:hover { text-decoration:underline; }
        .content { padding:24px 0 8px; }
        h1 { margin:0 0 8px; text-align:center; font-size:clamp(1.5rem,2.3vw,2rem); }
        .subtitle { margin:0 auto 22px; text-align:center; color:var(--muted); max-width:760px; line-height:1.5; }
        .cards { display:grid; gap:16px; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
        .card-body { padding:12px 14px; }
        .card-title { margin:0 0 8px; font-size:1.05rem; }
        .video { position:relative; width:100%; padding-top:56.25%; background:#000; }
        .video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
        .cover { position:relative; width:100%; padding-top:56.25%; background:#fff; border-bottom:1px solid var(--border); }
        .cover img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; padding:18px; }
        .btn { display:inline-block; margin-top:6px; padding:9px 12px; border-radius:8px; background:var(--brand); color:#fff; text-decoration:none; font-weight:600; }
        .footer { text-align:center; color:var(--muted); padding:16px 0; }
    </style>
</head>
<body>
    <div class="header-shell">
        <header class="container header">
            <h1>Invited Talks</h1>
            <a class="home-link" href="http://www.LiuYunchao.com">Back to Home</a>
        </header>
    </div>
    <main class="container content">
        <p class="subtitle">Selected talks and invited presentations.</p>
        <section class="cards">
            <article class="card">
                <div class="video"><iframe src="https://www.youtube.com/embed/THMHc0eZ9lg" title="AI4LIFE2026" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
                <div class="card-body"><h2 class="card-title">AI4LIFE2026</h2></div>
            </article>
            <article class="card">
                <div class="video"><iframe src="https://www.youtube.com/embed/P73oEikxI3Y" title="M2D2 2023" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
                <div class="card-body"><h2 class="card-title">M2D2 2023</h2></div>
            </article>
            <article class="card">
                <div class="video"><iframe src="https://www.youtube.com/embed/AW_oi60yIMQ?si=0scCp1C-KHVB1_qK" title="AAAI 2023 Talk" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
                <div class="card-body"><h2 class="card-title">AAAI 2023</h2></div>
            </article>
            <article class="card">
                <div class="cover"><img src="max_pluck_logo.svg" alt="Max Planck Institute logo"></div>
                <div class="card-body">
                    <h2 class="card-title">Max Planck Institute 2023</h2>
                    <a class="btn" href="https://www.mis.mpg.de/events/event/interpretable-chirality-aware-graph-neural-network-for-quantitative-structure-activity-relationship-modeling-in-drug-discovery" target="_blank" rel="noopener noreferrer">View Talk</a>
                </div>
            </article>
            <article class="card">
                <div class="cover"><img src="rosetta_workshop_logo.png" alt="Rosetta Workshop logo"></div>
                <div class="card-body">
                    <h2 class="card-title">Rosetta Workshop 2023</h2>
                    <a class="btn" href="../RosettaWorkshop2023" target="_blank" rel="noopener noreferrer">View Teaching</a>
                </div>
            </article>
            <article class="card">
                <div class="video"><iframe src="https://www.youtube.com/embed/zxQlnm_OcU4?si=beo-0JO2a9CuIMzP" title="MIG 2020 Talk" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
                <div class="card-body"><h2 class="card-title">MIG 2020</h2></div>
            </article>
        </section>
    </main>
    <div class="footer-shell"><footer class="container footer">www.LiuYunchao.com</footer></div>
</body>
</html>
