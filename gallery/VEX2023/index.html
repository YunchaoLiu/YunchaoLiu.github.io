<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VEX 2023</title>
    <meta name="description" content="VEX Robotics Competition highlights">
    <meta name="author" content="Yunchao (Lance) Liu">
    <link rel="shortcut icon" href="../../images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f3f5f9; --surface:#fff; --text:#1f2937; --muted:#5b6475; --brand:#2c98f0; --border:#e4e9f2; --shadow:0 10px 28px rgba(20,34,66,.08); --radius:8px; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:"Roboto",sans-serif; color:var(--text); background:linear-gradient(180deg,#f8faff 0%,var(--bg) 100%); }
        .container { width:min(1100px,92vw); margin:0 auto; }
        .header-shell,.footer-shell { background:var(--surface); border-bottom:1px solid var(--border); }
        .footer-shell { border-top:1px solid var(--border); border-bottom:0; margin-top:36px; }
        .header { padding:24px 0 18px; text-align:center; }
        .header img { width:min(220px,48vw); height:auto; }
        .home-link { display:inline-block; margin-top:12px; color:var(--brand); text-decoration:none; font-weight:700; }
        .home-link:hover { text-decoration:underline; }
        .content { padding:24px 0 8px; }
        h1 { margin:0 0 8px; text-align:center; font-size:clamp(1.5rem,2.3vw,2rem); }
        .subtitle { margin:0 auto 22px; text-align:center; color:var(--muted); max-width:760px; line-height:1.5; }
        .gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; }
        .gallery-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); cursor:pointer; }
        .gallery-item img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; }
        .card-body { padding:10px 12px; }
        .card-title { margin:0; font-size:.98rem; font-weight:600; color:#344053; }
        .lightbox { display:none; position:fixed; inset:0; background:rgba(15,23,42,.86); align-items:center; justify-content:center; padding:20px; z-index:1000; }
        .lightbox-content { max-width:min(1100px,96vw); max-height:92vh; background:#0f172a; border-radius:var(--radius); overflow:hidden; }
        .lightbox-content img { width:100%; height:auto; max-height:84vh; display:block; object-fit:contain; }
        .footer { text-align:center; color:var(--muted); padding:16px 0; }
    </style>
</head>
<body>
    <div class="header-shell">
        <header class="container header">
            <a href="https://www.vexrobotics.com/competition" target="_blank" rel="noopener noreferrer"><img src="images/vrc-spin-up.svg" alt="VEX Robotics"></a>
            <a class="home-link" href="http://www.LiuYunchao.com">Back to Home</a>
        </header>
    </div>
    <main class="container content">
        <h1>VEX Robotics Competition 2023</h1>
        <p class="subtitle">Snapshots from the competition and awards.</p>
        <section class="gallery">
            <article class="gallery-item lightbox-trigger" data-img-src="images/welcome.jpg"><img src="images/welcome.jpg" alt="VEX welcome"><div class="card-body"><p class="card-title">Welcome</p></div></article>
            <article class="gallery-item lightbox-trigger" data-img-src="images/competition.jpg"><img src="images/competition.jpg" alt="VEX competition"><div class="card-body"><p class="card-title">Competition</p></div></article>
            <article class="gallery-item lightbox-trigger" data-img-src="images/judges.jpg"><img src="images/judges.jpg" alt="VEX judges"><div class="card-body"><p class="card-title">Judges</p></div></article>
            <article class="gallery-item lightbox-trigger" data-img-src="images/awards.jpg"><img src="images/awards.jpg" alt="VEX awards"><div class="card-body"><p class="card-title">Awards</p></div></article>
            <article class="gallery-item lightbox-trigger" data-img-src="images/badge.jpg"><img src="images/badge.jpg" alt="VEX badge"><div class="card-body"><p class="card-title">Badge</p></div></article>
        </section>
    </main>
    <div class="lightbox" id="lightbox"><div class="lightbox-content"><img id="lightbox-img" src="" alt="Enlarged image"></div></div>
    <div class="footer-shell"><footer class="container footer">www.LiuYunchao.com</footer></div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var lightbox = document.getElementById("lightbox");
            var lightboxImg = document.getElementById("lightbox-img");
            document.querySelectorAll(".lightbox-trigger").forEach(function (trigger) {
                trigger.addEventListener("click", function () {
                    lightboxImg.src = trigger.getAttribute("data-img-src");
                    lightbox.style.display = "flex";
                });
            });
            lightbox.addEventListener("click", function () {
                lightbox.style.display = "none";
                lightboxImg.src = "";
            });
        });
    </script>
</body>
</html>
